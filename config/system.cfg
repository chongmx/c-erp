[options]

; ── Database ──────────────────────────────────────────────────────────────────
db_host     = localhost
db_port     = 5432
db_name     = odoo
db_user     = odoo
db_password = odoo
db_maxconn  = 10

; ── HTTP server ───────────────────────────────────────────────────────────────
http_interface = 0.0.0.0
http_port      = 8069
workers        = 4

; ── Static file serving ───────────────────────────────────────────────────────
http_doc_root  = web/static
http_index     = index.html

; ── Logging ───────────────────────────────────────────────────────────────────
log_level  = info
logfile    = log/system.log

; ── SMTP (mail) ───────────────────────────────────────────────────────────────
smtp_server   = localhost
smtp_port     = 25
smtp_ssl      = False
smtp_user     = False
smtp_password = False
email_from    = False
