<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>odoo-cpp</title>

    <!-- OWL — single file, no build step needed -->
    <script src="https://cdn.jsdelivr.net/npm/@odoo/owl@2/dist/owl.iife.js"></script>

    <style>
        *, *::before, *::after { box-sizing: border-box; }

        :root {
            --bg:        #1a1a2e;
            --surface:   #16213e;
            --border:    #0f3460;
            --accent:    #e94560;
            --text:      #eaeaea;
            --muted:     #8899aa;
            --ok:        #4ec9b0;
            --err:       #f44747;
        }

        body {
            margin: 0;
            font-family: 'Segoe UI', system-ui, sans-serif;
            background: var(--bg);
            color: var(--text);
            min-height: 100vh;
        }

        /* ---- layout ---- */
        .shell       { display: flex; height: 100vh; }
        .sidebar     { width: 220px; background: var(--surface); border-right: 1px solid var(--border);
                       display: flex; flex-direction: column; padding: 0; flex-shrink: 0; }
        .sidebar-logo{ padding: 20px 16px 8px; font-size: 1.1rem; font-weight: 700;
                       color: var(--accent); letter-spacing: .5px; border-bottom: 1px solid var(--border); }
        .nav-item    { padding: 12px 16px; cursor: pointer; color: var(--muted);
                       border-left: 3px solid transparent; transition: all .15s; font-size: .9rem; }
        .nav-item:hover    { background: rgba(255,255,255,.04); color: var(--text); }
        .nav-item.active   { border-left-color: var(--accent); color: var(--text); background: rgba(233,69,96,.08); }
        .main        { flex: 1; display: flex; flex-direction: column; overflow: hidden; }
        .topbar      { padding: 14px 24px; border-bottom: 1px solid var(--border);
                       display: flex; align-items: center; gap: 12px; background: var(--surface); }
        .topbar h1   { margin: 0; font-size: 1rem; font-weight: 600; }
        .content     { flex: 1; overflow-y: auto; padding: 24px; }

        /* ---- components ---- */
        .card        { background: var(--surface); border: 1px solid var(--border);
                       border-radius: 8px; padding: 20px; margin-bottom: 16px; }
        .card h2     { margin: 0 0 16px; font-size: .95rem; color: var(--muted); text-transform: uppercase;
                       letter-spacing: .5px; font-weight: 600; }

        button       { background: var(--accent); color: #fff; border: none; padding: 7px 16px;
                       border-radius: 5px; cursor: pointer; font-size: .85rem; font-weight: 600;
                       transition: opacity .15s; }
        button:hover { opacity: .85; }
        button:disabled { opacity: .4; cursor: default; }
        button.ghost { background: transparent; border: 1px solid var(--border); color: var(--muted); }
        button.ghost:hover { border-color: var(--accent); color: var(--text); }

        .badge       { display: inline-block; padding: 2px 8px; border-radius: 10px;
                       font-size: .75rem; font-weight: 600; }
        .badge.ok    { background: rgba(78,201,176,.15); color: var(--ok); }
        .badge.err   { background: rgba(244,71,71,.15);  color: var(--err); }

        table        { width: 100%; border-collapse: collapse; font-size: .875rem; }
        th           { text-align: left; padding: 8px 12px; color: var(--muted);
                       border-bottom: 1px solid var(--border); font-weight: 600; font-size: .8rem;
                       text-transform: uppercase; letter-spacing: .4px; }
        td           { padding: 10px 12px; border-bottom: 1px solid rgba(255,255,255,.05); }
        tr:hover td  { background: rgba(255,255,255,.03); }
        td.empty     { color: var(--muted); text-align: center; padding: 32px; }

        .field-grid  { display: grid; grid-template-columns: repeat(auto-fill, minmax(220px,1fr)); gap: 12px; }
        .field-item  { background: rgba(255,255,255,.03); border: 1px solid var(--border);
                       border-radius: 6px; padding: 12px; }
        .field-name  { font-size: .8rem; color: var(--accent); font-weight: 600; margin-bottom: 4px; }
        .field-type  { font-size: .75rem; color: var(--muted); }
        .field-label { font-size: .85rem; color: var(--text); }

        .spinner     { display: inline-block; width: 16px; height: 16px; border: 2px solid var(--border);
                       border-top-color: var(--accent); border-radius: 50%; animation: spin .6s linear infinite; }
        @keyframes spin { to { transform: rotate(360deg); } }

        .status-row  { display: flex; align-items: center; gap: 10px; margin-bottom: 8px; }
        .status-label{ width: 120px; color: var(--muted); font-size: .85rem; }

        input, select {
            background: rgba(255,255,255,.06); border: 1px solid var(--border); color: var(--text);
            padding: 7px 10px; border-radius: 5px; font-size: .875rem; outline: none;
        }
        input:focus, select:focus { border-color: var(--accent); }
        .form-row    { display: flex; gap: 8px; align-items: center; margin-bottom: 12px; }
        .form-row label { width: 80px; color: var(--muted); font-size: .85rem; }
    </style>
</head>
<body>
<div id="app"></div>
<script type="text/javascript">
const { Component, useState, useRef, onMounted, xml, mount, reactive } = owl;

// ============================================================
// JSON-RPC helpers
// ============================================================
let rpcId = 1;

async function rpc(model, method, args = [], kwargs = {}) {
    const res = await fetch('/web/dataset/call_kw', {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({
            jsonrpc: '2.0', method: 'call', id: rpcId++,
            params: { model, method, args, kwargs }
        })
    });
    const data = await res.json();
    if (data.error) throw new Error(data.error.data?.message || data.error.message);
    return data.result;
}

async function getHealth() {
    const res = await fetch('/healthz');
    return res.json();
}

async function getSessionInfo() {
    const res = await fetch('/web/session/get_session_info');
    const data = await res.json();
    return data.result ?? data;
}

// ============================================================
// Dashboard component
// ============================================================
class Dashboard extends Component {
    static template = xml`
        <div>
            <div class="card">
                <h2>Server Status</h2>
                <t t-if="state.loading"><div class="spinner"/></t>
                <t t-else="">
                    <div class="status-row">
                        <span class="status-label">HTTP Server</span>
                        <span class="badge ok">online</span>
                    </div>
                    <div class="status-row">
                        <span class="status-label">Database</span>
                        <span t-attf-class="badge {{ state.health.status === 'ok' ? 'ok' : 'err' }}">
                            <t t-esc="state.health.status ?? 'unknown'"/>
                        </span>
                    </div>
                    <div class="status-row">
                        <span class="status-label">Session UID</span>
                        <span class="badge ok" t-esc="state.session.uid ?? 0"/>
                    </div>
                </t>
            </div>
            <div class="card">
                <h2>Quick Actions</h2>
                <button t-on-click="refresh">Refresh Status</button>
            </div>
        </div>
    `;

    state = useState({ loading: true, health: {}, session: {} });

    setup() {
        onMounted(() => this.refresh());
    }

    async refresh() {
        this.state.loading = true;
        try {
            const [health, session] = await Promise.all([getHealth(), getSessionInfo()]);
            this.state.health  = health;
            this.state.session = session;
        } catch(e) {
            this.state.health = { status: 'error: ' + e.message };
        }
        this.state.loading = false;
    }
}

// ============================================================
// Partners list component
// ============================================================
class PartnerList extends Component {
    static template = xml`
        <div>
            <div class="card">
                <h2>Search Partners</h2>
                <div class="form-row">
                    <label>Name</label>
                    <input t-model="state.searchName" placeholder="filter by name…" t-on-keydown="onKey"/>
                    <button t-on-click="search" t-att-disabled="state.loading">
                        <t t-if="state.loading"><span class="spinner"/></t>
                        <t t-else="">Search</t>
                    </button>
                </div>
                <div class="form-row">
                    <label>Limit</label>
                    <select t-model="state.limit">
                        <option value="10">10</option>
                        <option value="25">25</option>
                        <option value="80">80</option>
                    </select>
                </div>
            </div>

            <div class="card">
                <h2>Results
                    <t t-if="state.records.length">
                        — <span class="badge ok" t-esc="state.records.length"/> records
                    </t>
                </h2>
                <t t-if="state.error">
                    <span class="badge err" t-esc="state.error"/>
                </t>
                <t t-elif="!state.records.length and !state.loading">
                    <td class="empty">No records — click Search to load partners.</td>
                </t>
                <t t-else="">
                    <table>
                        <thead>
                            <tr>
                                <th>ID</th>
                                <th>Name</th>
                                <th>Email</th>
                                <th>Phone</th>
                                <th>Company?</th>
                            </tr>
                        </thead>
                        <tbody>
                            <t t-foreach="state.records" t-as="r" t-key="r.id">
                                <tr>
                                    <td t-esc="r.id"/>
                                    <td t-esc="r.name || '—'"/>
                                    <td t-esc="r.email || '—'"/>
                                    <td t-esc="r.phone || '—'"/>
                                    <td>
                                        <span t-attf-class="badge {{ r.is_company ? 'ok' : 'ghost' }}"
                                              t-esc="r.is_company ? 'Yes' : 'No'"/>
                                    </td>
                                </tr>
                            </t>
                        </tbody>
                    </table>
                </t>
            </div>
        </div>
    `;

    state = useState({
        searchName: '',
        limit: '10',
        loading: false,
        records: [],
        error: null,
    });

    onKey(ev) {
        if (ev.key === 'Enter') this.search();
    }

    async search() {
        this.state.loading = true;
        this.state.error   = null;
        try {
            const domain = this.state.searchName
                ? [['name', 'ilike', this.state.searchName]]
                : [];
            this.state.records = await rpc('res.partner', 'search_read',
                [domain],
                { fields: ['name','email','phone','is_company'], limit: parseInt(this.state.limit) }
            );
        } catch(e) {
            this.state.error   = e.message;
            this.state.records = [];
        }
        this.state.loading = false;
    }
}

// ============================================================
// Fields inspector component
// ============================================================
class FieldsInspector extends Component {
    static template = xml`
        <div>
            <div class="card">
                <h2>Model Fields Inspector</h2>
                <div class="form-row">
                    <label>Model</label>
                    <input t-model="state.model" placeholder="e.g. res.partner"/>
                    <button t-on-click="load" t-att-disabled="state.loading">
                        <t t-if="state.loading"><span class="spinner"/></t>
                        <t t-else="">Load Fields</t>
                    </button>
                </div>
            </div>

            <t t-if="state.error">
                <div class="card">
                    <span class="badge err" t-esc="state.error"/>
                </div>
            </t>

            <t t-if="Object.keys(state.fields).length">
                <div class="card">
                    <h2>Fields — <t t-esc="state.model"/></h2>
                    <div class="field-grid">
                        <t t-foreach="Object.entries(state.fields)" t-as="entry" t-key="entry[0]">
                            <div class="field-item">
                                <div class="field-name" t-esc="entry[0]"/>
                                <div class="field-label" t-esc="entry[1].string || ''"/>
                                <div class="field-type" t-esc="entry[1].type || ''"/>
                            </div>
                        </t>
                    </div>
                </div>
            </t>
        </div>
    `;

    state = useState({ model: 'res.partner', loading: false, fields: {}, error: null });

    async load() {
        this.state.loading = true;
        this.state.error   = null;
        this.state.fields  = {};
        try {
            this.state.fields = await rpc(this.state.model, 'fields_get', [], { attributes: ['string','type'] });
        } catch(e) {
            this.state.error = e.message;
        }
        this.state.loading = false;
    }
}

// ============================================================
// Root App — navigation shell
// ============================================================
const PAGES = {
    dashboard: { label: '⬡  Dashboard',   component: Dashboard },
    partners:  { label: '👤  Partners',    component: PartnerList },
    fields:    { label: '🔎  Field Inspector', component: FieldsInspector },
};

class App extends Component {
    static template = xml`
        <div class="shell">
            <nav class="sidebar">
                <div class="sidebar-logo">odoo-cpp</div>
                <t t-foreach="Object.entries(pages)" t-as="entry" t-key="entry[0]">
                    <div t-attf-class="nav-item {{ state.page === entry[0] ? 'active' : '' }}"
                         t-on-click="() => state.page = entry[0]"
                         t-esc="entry[1].label"/>
                </t>
            </nav>
            <div class="main">
                <div class="topbar">
                    <h1 t-esc="pages[state.page].label"/>
                </div>
                <div class="content">
                    <t t-component="pages[state.page].component"/>
                </div>
            </div>
        </div>
    `;

    static components = { Dashboard, PartnerList, FieldsInspector };

    pages = PAGES;
    state = useState({ page: 'dashboard' });
}

// Boot
mount(App, document.getElementById('app'));
</script>
</body>
</html>
